version: "3.9"

services:
  db_test:
    image: postgres:16
    container_name: db_test
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: test
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    networks:
      - test

volumes:
  postgres_test_data:

networks:
  test: